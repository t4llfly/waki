version: "3.8"

services:
  lavalink:
    image: ghcr.io/lavalink-devs/lavalink:latest
    container_name: waki_lavalink
    restart: unless-stopped
    environment:
      - _JAVA_OPTIONS=-Xmx1G -Xms512M -XX:+UseG1GC -XX:+ParallelRefProcEnabled -XX:+UnlockExperimentalVMOptions -XX:+DoEscapeAnalysis -XX:MaxGCPauseMillis=10
    volumes:
      - ./lavalink/application.yml:/opt/Lavalink/application.yml
      - ./lavalink/plugins:/opt/Lavalink/plugins

  music_bot:
    build: .
    container_name: waki
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
    ports:
      - "8080:8080"
    volumes:
      - .:/app
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  web_panel:
    build: ./wakiwebplayer
    container_name: waki_web_panel
    restart: unless-stopped
    depends_on:
      - music_bot
    ports:
      - "6767:3000"
    env_file:
      - ./wakiwebplayer/.env
